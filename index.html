<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Listening Post</title>
    <link rel="stylesheet" href="indexStyle.css">
</head>
<body>
<div class="row">
    <div class="column-left">
    </div>
    <div class="column-center">
        <div class="chat-display">
            <div id="output"></div>
        </div>
        <div class="chat-input">
            <input type="text" id="name" class="name-input" placeholder="Your name (optional)" autocomplete="username">
            <textarea id="msg" name="message" class="msg-input" rows="5" placeholder="Type your message..."></textarea>
            <button type="button" id="submit">Submit</button>
        </div>
    </div>
    <div class="column-right">
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
